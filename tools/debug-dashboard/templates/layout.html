{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merkle Service Debug - {{.Title}}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; line-height: 1.6; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
        .nav-brand { font-weight: bold; font-size: 16px; color: #f0f6fc; }
        .nav a { color: #8b949e; font-size: 14px; }
        .nav a:hover, .nav a.active { color: #f0f6fc; }
        .nav-stats { margin-left: auto; font-size: 12px; color: #8b949e; }
        .nav-stats span { margin-left: 16px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

        .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        .flash-success { background: #0d1f0d; border: 1px solid #238636; color: #3fb950; }
        .flash-error { background: #1f0d0d; border: 1px solid #da3633; color: #f85149; }

        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; margin-bottom: 16px; }
        .card h2 { font-size: 16px; margin-bottom: 12px; color: #f0f6fc; }
        .card h3 { font-size: 14px; margin-bottom: 8px; color: #8b949e; }

        input[type="text"] { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 8px 12px; border-radius: 6px; font-size: 14px; font-family: monospace; width: 100%; }
        input[type="text"]:focus { border-color: #58a6ff; outline: none; }

        button, .btn { background: #238636; border: 1px solid #2ea043; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; display: inline-block; }
        button:hover, .btn:hover { background: #2ea043; }
        .btn-danger { background: #da3633; border-color: #f85149; }
        .btn-danger:hover { background: #f85149; }
        .btn-secondary { background: #21262d; border-color: #30363d; }
        .btn-secondary:hover { background: #30363d; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; }
        .form-row { display: flex; gap: 12px; align-items: end; }
        .form-row .form-group { flex: 1; }
        .form-row button { flex-shrink: 0; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 8px 12px; border-bottom: 1px solid #30363d; color: #8b949e; font-size: 12px; text-transform: uppercase; }
        td { padding: 8px 12px; border-bottom: 1px solid #21262d; font-family: monospace; font-size: 13px; word-break: break-all; }
        tr:hover { background: #1c2128; }

        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-seen { background: #0d2818; color: #3fb950; border: 1px solid #238636; }
        .badge-mined { background: #0d1f3c; color: #58a6ff; border: 1px solid #1f6feb; }
        .badge-multi { background: #2d1b00; color: #d29922; border: 1px solid #9e6a03; }

        .callback-entry { border-left: 3px solid #30363d; padding: 12px 16px; margin-bottom: 12px; background: #0d1117; border-radius: 0 6px 6px 0; }
        .callback-entry.seen { border-left-color: #3fb950; }
        .callback-entry.mined { border-left-color: #58a6ff; }
        .callback-entry.multi { border-left-color: #d29922; }
        .callback-meta { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
        .callback-json { background: #161b22; padding: 8px 12px; border-radius: 4px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; overflow-x: auto; margin-top: 8px; }

        .empty { text-align: center; padding: 40px; color: #8b949e; }

        .stats { display: flex; gap: 16px; margin-bottom: 16px; }
        .stat { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 16px 20px; flex: 1; text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; color: #f0f6fc; }
        .stat-label { font-size: 12px; color: #8b949e; margin-top: 4px; }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="nav-brand">Merkle Debug</span>
        <a href="/" {{if eq .Title "Home"}}class="active"{{end}}>Home</a>
        <a href="/registrations" {{if eq .Title "Registrations"}}class="active"{{end}}>Registrations</a>
        <a href="/callbacks" {{if eq .Title "Callbacks"}}class="active"{{end}}>Callbacks</a>
        <a href="/stump" {{if eq .Title "STUMP Visualizer"}}class="active"{{end}}>STUMP Visualizer</a>
        <div class="nav-stats">
            <span>Tracked: {{.TxidCount}}</span>
            <span>Callbacks: {{.CallbackCount}}</span>
        </div>
    </nav>
    <div class="container">
        {{if .Flash}}<div class="flash flash-success">{{.Flash}}</div>{{end}}
        {{if .FlashError}}<div class="flash flash-error">{{.FlashError}}</div>{{end}}
        {{template "content" .}}
    </div>
</body>
</html>
{{end}}
